<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간업무 취합 대시보드</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    --purple:#7132F5; --purple-dark:#5824C4; --purple-tint:#F2ECFE;
    --ink:#1D1B23; --sub:#6B6875; --line:#E4E1EC; --bg:#FAF9FC; --card:#FFFFFF;
    --danger:#D8453A; --warn-bg:#FDEDE9; --warn-ink:#B23A2E;
    --amber:#B8790F; --amber-tint:#FCF1DD;
    --teal:#0F6E56; --teal-tint:#E2F3EE;
    --blue:#1D5FA5; --blue-tint:#E7F1FB;
    --green:#2F7A34; --green-tint:#E8F4E6;
    --gray:#5F5E5A; --gray-tint:#EDECE8;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--ink);}
  .wrap{max-width:1200px;margin:0 auto;padding:28px 20px 90px;}
  .icon{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;vertical-align:-2px;}

  header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;margin-bottom:22px;}
  header h1{font-size:22px;font-weight:800;margin:0 0 2px;letter-spacing:-0.01em;}
  header p{font-size:13px;color:var(--sub);margin:0;}
  .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  select,input[type=text]{font-family:inherit;font-size:14px;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);}
  .btn{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;border:none;font-weight:700;font-size:13px;cursor:pointer;}
  .btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;}
  .btn-primary{background:var(--purple);color:#fff;}
  .btn-primary:hover{background:var(--purple-dark);}

  .top-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;margin-bottom:14px;}
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  .stat-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;}
  .stat-card .label{font-size:12px;color:var(--sub);font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
  .stat-card .value{font-size:23px;font-weight:800;letter-spacing:-0.01em;}
  .stat-card.warn .value{color:var(--warn-ink);}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;}
  .panel-title{font-size:13px;font-weight:800;color:var(--sub);margin-bottom:14px;}

  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .bar-row .name{width:78px;font-size:12px;font-weight:600;flex-shrink:0;}
  .bar-track{flex:1;height:16px;background:var(--gray-tint);border-radius:8px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--purple);border-radius:8px;}
  .bar-row .val{width:78px;text-align:right;font-size:12px;color:var(--sub);flex-shrink:0;}

  .donut-wrap{display:flex;align-items:center;gap:18px;}
  .donut{width:110px;height:110px;border-radius:50%;flex-shrink:0;}
  .legend{display:flex;flex-direction:column;gap:8px;}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:12px;}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

  .section-title{font-size:16px;font-weight:800;margin:26px 0 12px;letter-spacing:-0.01em;}
  .team-block{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden;}
  .team-head{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:var(--purple-tint);}
  .team-head .name{font-weight:800;font-size:15px;color:var(--purple-dark);}
  .team-head .meta{font-size:12px;color:var(--sub);display:flex;align-items:center;gap:8px;}
  .pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;}
  .pill.warn{background:var(--warn-bg);color:var(--warn-ink);}
  .stage-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;}
  .stage-badge.s-제안{background:var(--amber-tint);color:var(--amber);}
  .stage-badge.s-수행{background:var(--teal-tint);color:var(--teal);}
  .stage-badge.s-제안\/수행{background:var(--purple-tint);color:var(--purple-dark);}
  .stage-badge.s-수행\/정산{background:var(--blue-tint);color:var(--blue);}
  .stage-badge.s-계약{background:var(--green-tint);color:var(--green);}
  .stage-badge.s-기타{background:var(--gray-tint);color:var(--gray);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;padding:10px 14px;color:var(--sub);font-weight:700;border-bottom:1px solid var(--line);white-space:nowrap;}
  td{padding:10px 14px;border-bottom:1px solid var(--line);vertical-align:top;}
  tr:last-child td{border-bottom:none;}
  tr.stalled td{background:var(--warn-bg);}

  .ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
  .ind-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;}
  .ind-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .ind-avatar{width:28px;height:28px;border-radius:50%;background:var(--purple-tint);color:var(--purple-dark);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
  .ind-card .name{font-weight:800;font-size:13px;}
  .ind-card .team{font-size:11px;color:var(--sub);}
  .ind-card .lbl{font-size:11px;color:var(--sub);font-weight:600;margin-top:8px;}
  .ind-card .txt{font-size:13px;margin-top:2px;white-space:pre-wrap;}
  .empty{color:var(--sub);font-size:13px;padding:24px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>주간업무 취합 대시보드</h1>
      <p>팀장·개인 입력이 자동으로 취합된 현황입니다.</p>
    </div>
    <div class="controls">
      <select id="weekSelect"></select>
      <input type="text" id="search" placeholder="고객사/사업명 검색">
      <button class="btn btn-primary" id="exportBtn">
        <svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
        엑셀 내보내기
      </button>
    </div>
  </header>

  <div class="top-grid">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="label"><svg class="icon" viewBox="0 0 24 24"><path d="M4 6a2 2 0 012-2h12a2 2 0 012 2v2H4V6zM4 10h16v8a2 2 0 01-2 2H6a2 2 0 01-2-2v-8z"/></svg>전체 프로젝트</div>
        <div class="value" id="statProjects">-</div>
      </div>
      <div class="stat-card">
        <div class="label"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 8h5a2 2 0 010 4H9m0 0h5m-5 0v4"/></svg>합계 매출</div>
        <div class="value" id="statRevenue">-</div>
      </div>
      <div class="stat-card warn">
        <div class="label"><svg class="icon" viewBox="0 0 24 24"><path d="M12 8v5M12 16h.01M10.3 3.9L2.7 17a2 2 0 001.7 3h15.2a2 2 0 001.7-3L13.7 3.9a2 2 0 00-3.4 0z"/></svg>정체 프로젝트</div>
        <div class="value" id="statStalled">-</div>
      </div>
      <div class="stat-card">
        <div class="label"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.2"/><path d="M5 20c1.5-4 4.5-6 7-6s5.5 2 7 6"/></svg>개인 제출 인원</div>
        <div class="value" id="statInd">-</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">단계별 분포</div>
      <div class="donut-wrap">
        <div class="donut" id="donut"></div>
        <div class="legend" id="donutLegend"></div>
      </div>
    </div>
  </div>

  <div class="panel" style="margin-bottom:14px;">
    <div class="panel-title">팀별 매출 비중</div>
    <div id="revenueBars"></div>
  </div>

  <div class="section-title">팀별 현황</div>
  <div id="teamBlocks"></div>

  <div class="section-title">개인별 업무결과 및 계획</div>
  <div class="ind-grid" id="indGrid"></div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzV2aacbgOpzp4uHYwR4WojeNfHW3NfvYJK4-XjXkWtGsIdgjU_e5MUMMLnfD-eWh6N8Q/exec';

const STAGE_COLORS = {
  '제안': '#B8790F', '수행': '#0F6E56', '제안/수행': '#5824C4',
  '수행/정산': '#1D5FA5', '계약': '#2F7A34'
};
const STAGE_FALLBACK = '#5F5E5A';

let allTeamData = [];
let allIndData = [];

function fmtMoney(n){
  if (!n) return '0원';
  return Math.round(n).toLocaleString('ko-KR') + '원';
}
function stageClass(stage){
  const known = ['제안','수행','제안/수행','수행/정산','계약'];
  return known.includes(stage) ? 's-' + stage.replace('/', '\\/') : 's-기타';
}

async function loadWeeks(){
  const res = await fetch(`${API_URL}?action=weeks`);
  const weeks = await res.json();
  const sel = document.getElementById('weekSelect');
  sel.innerHTML = weeks.map(w => `<option value="${w}">${w} 주차</option>`).join('');
  if (weeks.length) loadWeek(weeks[0]);
  else renderEmpty();
}

function renderEmpty(){
  document.getElementById('teamBlocks').innerHTML = '<div class="empty">아직 제출된 데이터가 없습니다.</div>';
  document.getElementById('indGrid').innerHTML = '<div class="empty">아직 제출된 데이터가 없습니다.</div>';
}

async function loadWeek(week){
  const [dash, team, ind] = await Promise.all([
    fetch(`${API_URL}?action=dashboard&week=${encodeURIComponent(week)}`).then(r => r.json()),
    fetch(`${API_URL}?action=teamData&week=${encodeURIComponent(week)}`).then(r => r.json()),
    fetch(`${API_URL}?action=individualData&week=${encodeURIComponent(week)}`).then(r => r.json())
  ]);
  allTeamData = team; allIndData = ind;
  renderStats(dash);
  renderTeams(dash.byTeam, team);
  renderIndividuals(ind);
  renderRevenueBars(dash.byTeam);
  renderDonut(team);
}

function renderStats(dash){
  document.getElementById('statProjects').textContent = dash.totalProjects;
  document.getElementById('statRevenue').textContent = fmtMoney(dash.totalRevenue);
  document.getElementById('statStalled').textContent = dash.totalStalled;
  document.getElementById('statInd').textContent = dash.individualCount;
}

function renderRevenueBars(byTeam){
  const el = document.getElementById('revenueBars');
  if (!byTeam || !byTeam.length) { el.innerHTML = '<div class="empty">데이터가 없습니다.</div>'; return; }
  const max = Math.max(...byTeam.map(t => t.revenue), 1);
  el.innerHTML = byTeam.map(t => `
    <div class="bar-row">
      <div class="name">${t.team}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max((t.revenue/max*100),2)}%"></div></div>
      <div class="val">${fmtMoney(t.revenue)}</div>
    </div>
  `).join('');
}

function renderDonut(teamRows){
  const counts = {};
  teamRows.forEach(r => {
    const s = r.Stage || '기타';
    counts[s] = (counts[s] || 0) + 1;
  });
  const total = teamRows.length || 1;
  let acc = 0;
  const stops = [];
  Object.entries(counts).forEach(([stage, count]) => {
    const color = STAGE_COLORS[stage] || STAGE_FALLBACK;
    const start = acc / total * 360;
    acc += count;
    const end = acc / total * 360;
    stops.push(`${color} ${start}deg ${end}deg`);
  });
  document.getElementById('donut').style.background = stops.length
    ? `conic-gradient(${stops.join(',')})`
    : 'var(--gray-tint)';
  document.getElementById('donutLegend').innerHTML = Object.entries(counts).map(([stage, count]) => `
    <div class="legend-item"><span class="dot" style="background:${STAGE_COLORS[stage] || STAGE_FALLBACK}"></span>${stage} ${count}건</div>
  `).join('') || '<div class="legend-item">데이터 없음</div>';
}

function isStalled(r){
  const l = String(r.LastWeek||'').trim(), c = String(r.ThisWeek||'').trim();
  return l && c && l === c;
}

function renderTeams(byTeam, teamRows){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const container = document.getElementById('teamBlocks');
  if (!byTeam || !byTeam.length) { container.innerHTML = '<div class="empty">데이터가 없습니다.</div>'; return; }

  container.innerHTML = byTeam.map(t => {
    const rows = teamRows.filter(r => (r.Team || '미지정') === t.team)
      .filter(r => !q || (String(r.Client).toLowerCase().includes(q) || String(r.Project).toLowerCase().includes(q)));
    if (!rows.length) return '';
    return `
      <div class="team-block">
        <div class="team-head">
          <span class="name">${t.team}</span>
          <span class="meta">프로젝트 ${t.projectCount}건 · 매출 ${fmtMoney(t.revenue)} ${t.stalled.length ? `<span class="pill warn">정체 ${t.stalled.length}건</span>` : ''}</span>
        </div>
        <table>
          <thead><tr><th>고객사</th><th>담당</th><th>사업명</th><th>단계</th><th>전주내용</th><th>금주내용</th><th>매출</th></tr></thead>
          <tbody>
            ${rows.map(r => `
              <tr class="${isStalled(r) ? 'stalled' : ''}">
                <td>${r.Client || ''}</td>
                <td>${r.Owner || ''}</td>
                <td>${r.Project || ''}</td>
                <td><span class="stage-badge ${stageClass(r.Stage)}">${r.Stage || '-'}</span></td>
                <td>${r.LastWeek || ''}</td>
                <td>${r.ThisWeek || ''}</td>
                <td>${r.Revenue || ''}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  }).join('') || '<div class="empty">검색 결과가 없습니다.</div>';
}

function renderIndividuals(ind){
  const grid = document.getElementById('indGrid');
  if (!ind || !ind.length) { grid.innerHTML = '<div class="empty">제출된 개인 현황이 없습니다.</div>'; return; }
  grid.innerHTML = ind.map(r => `
    <div class="ind-card">
      <div class="ind-head">
        <div class="ind-avatar">${(r.Name || '?').toString().slice(0,1)}</div>
        <div>
          <div class="name">${r.Name || ''}</div>
          <div class="team">${r.Team || ''}</div>
        </div>
      </div>
      <div class="lbl">이번주 한 일</div><div class="txt">${r.LastWeek || '-'}</div>
      <div class="lbl">다음주 할 일</div><div class="txt">${r.ThisWeek || '-'}</div>
      ${r.Notes ? `<div class="lbl">특이사항</div><div class="txt">${r.Notes}</div>` : ''}
    </div>
  `).join('');
}

document.getElementById('weekSelect').addEventListener('change', (e) => loadWeek(e.target.value));
document.getElementById('search').addEventListener('input', () => {
  renderTeams(computeByTeamFromCache(), allTeamData);
});
document.getElementById('exportBtn').addEventListener('click', () => {
  const week = document.getElementById('weekSelect').value;
  window.open(`${API_URL}?action=exportExcel&week=${encodeURIComponent(week)}`, '_blank');
});

function computeByTeamFromCache(){
  const byTeam = {};
  allTeamData.forEach(r => {
    const t = r.Team || '미지정';
    if (!byTeam[t]) byTeam[t] = { team: t, projectCount: 0, revenue: 0, stalled: [] };
    byTeam[t].projectCount++;
    const rev = parseFloat(String(r.Revenue).replace(/[^0-9.]/g, ''));
    if (!isNaN(rev)) byTeam[t].revenue += rev;
    if (isStalled(r)) byTeam[t].stalled.push(r);
  });
  return Object.values(byTeam);
}

loadWeeks();
</script>
</body>
</html>
